spring.application.name=capgemini-backend
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.time-zone=UTC
server.error.include-message=never
app.jwt.issuer=${JWT_ISSUER}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.jwt.signing-key-base64=${JWT_SIGNING_KEY_BASE64}
app.jwt.encryption-key-base64=${JWT_ENCRYPTION_KEY_BASE64}
app.impact-co2.base-url=${IMPACT_CO2_BASE_URL}
app.impact-co2.api-key=${IMPACT_CO2_API_KEY}
app.impact-co2.reference-surface-m2=${IMPACT_CO2_REFERENCE_SURFACE_M2}
app.impact-co2.reference-annual-consumption-mwh=${IMPACT_CO2_REFERENCE_ANNUAL_CONSUMPTION_MWH}
app.seed.sites.enabled=${SEED_SITES_ENABLED}
app.seed.sites.force-reload=${SEED_SITES_FORCE_RELOAD}
app.seed.sites.seed-user-email=${SEED_SITES_USER_EMAIL}
app.seed.sites.seed-user-password=${SEED_SITES_USER_PASSWORD}
app.seed.sites.csv-path=${SEED_SITES_CSV_PATH:seed/sites_seed.csv}
app.seed.sites.random-count=${SEED_SITES_RANDOM_COUNT:8}
logging.level.org.apache.coyote.http11.Http11Processor=ERROR