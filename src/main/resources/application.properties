spring.application.name=capgemini-backend
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.time-zone=UTC
server.error.include-message=never
app.jwt.issuer=${JWT_ISSUER}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.jwt.signing-key-base64=${JWT_SIGNING_KEY_BASE64}
app.jwt.encryption-key-base64=${JWT_ENCRYPTION_KEY_BASE64}
logging.level.org.apache.coyote.http11.Http11Processor=ERROR